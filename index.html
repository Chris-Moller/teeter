<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teeter</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #000; }
    canvas { display: block; }
    #overlay {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      text-align: center;
      font-size: 1.4em;
      line-height: 1.6;
      pointer-events: none;
      z-index: 10;
    }
    #overlay .title {
      font-size: 2em;
      font-weight: 700;
      margin-bottom: 0.3em;
      letter-spacing: 0.05em;
    }
    #overlay .subtitle {
      font-size: 0.8em;
      opacity: 0.7;
      white-space: pre-line;
    }
    #overlay.error {
      color: #ff6b6b;
    }
    #overlay.hidden {
      display: none;
    }
    #score {
      position: fixed;
      top: 16px;
      left: 16px;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 1.6em;
      font-weight: 700;
      z-index: 10;
      pointer-events: none;
      text-shadow: 0 2px 4px rgba(0,0,0,0.5);
      background: rgba(0,0,0,0.3);
      padding: 6px 14px;
      border-radius: 8px;
      display: none;
    }
    #leaderboard-btn {
      position: fixed;
      top: 16px;
      right: 16px;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 1em;
      font-weight: 600;
      z-index: 10;
      cursor: pointer;
      text-shadow: 0 2px 4px rgba(0,0,0,0.5);
      background: rgba(0,0,0,0.3);
      padding: 6px 14px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.2);
      display: none;
    }
    #leaderboard-btn:hover {
      background: rgba(255,255,255,0.15);
    }
    #gameover-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 20;
      background: rgba(0,0,0,0.6);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #fff;
      pointer-events: auto;
    }
    #gameover-overlay.visible {
      display: flex;
    }
    #gameover-overlay .gameover-box {
      text-align: center;
      background: rgba(0,0,0,0.8);
      padding: 40px 50px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.1);
      min-width: 300px;
    }
    #gameover-overlay .gameover-title {
      font-size: 2.4em;
      font-weight: 700;
      letter-spacing: 0.05em;
      margin-bottom: 8px;
    }
    #gameover-overlay .gameover-score {
      font-size: 1.4em;
      opacity: 0.8;
      margin-bottom: 20px;
    }
    #gameover-overlay .gameover-message {
      font-size: 1em;
      opacity: 0.7;
      margin-bottom: 16px;
    }
    #gameover-overlay .name-entry {
      display: none;
    }
    #gameover-overlay .name-entry.visible {
      display: block;
    }
    #gameover-overlay .name-entry input {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 1.1em;
      padding: 8px 12px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.3);
      background: rgba(255,255,255,0.1);
      color: #fff;
      outline: none;
      width: 200px;
      text-align: center;
    }
    #gameover-overlay .name-entry input::placeholder {
      color: rgba(255,255,255,0.4);
    }
    #gameover-overlay .name-entry button {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 1em;
      padding: 8px 20px;
      border-radius: 8px;
      border: none;
      background: #fff;
      color: #000;
      font-weight: 600;
      cursor: pointer;
      margin-top: 12px;
    }
    #gameover-overlay .name-entry button:hover {
      background: #ddd;
    }
    #leaderboard-panel {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 30;
      background: rgba(0,0,0,0.7);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #fff;
      pointer-events: auto;
    }
    #leaderboard-panel.visible {
      display: flex;
    }
    #leaderboard-panel .leaderboard-box {
      text-align: center;
      background: rgba(0,0,0,0.85);
      padding: 30px 40px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.1);
      min-width: 320px;
      max-height: 80vh;
      overflow-y: auto;
    }
    #leaderboard-panel .leaderboard-title {
      font-size: 1.8em;
      font-weight: 700;
      letter-spacing: 0.05em;
      margin-bottom: 20px;
    }
    #leaderboard-panel table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 20px;
    }
    #leaderboard-panel th {
      font-size: 0.8em;
      text-transform: uppercase;
      opacity: 0.5;
      padding: 6px 12px;
      border-bottom: 1px solid rgba(255,255,255,0.15);
    }
    #leaderboard-panel td {
      padding: 8px 12px;
      font-size: 1em;
    }
    #leaderboard-panel tr:nth-child(even) {
      background: rgba(255,255,255,0.04);
    }
    #leaderboard-panel .leaderboard-empty {
      opacity: 0.5;
      font-size: 0.9em;
      margin-bottom: 20px;
    }
    #leaderboard-panel .close-btn {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 1em;
      padding: 8px 24px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.2);
      background: transparent;
      color: #fff;
      cursor: pointer;
    }
    #leaderboard-panel .close-btn:hover {
      background: rgba(255,255,255,0.1);
    }
  </style>
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.183.2/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.183.2/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <div id="score">Score: 0</div>
  <button id="leaderboard-btn">Leaderboard</button>
  <div id="overlay">
    <div class="title">TEETER</div>
    <div class="subtitle">Loading...</div>
  </div>
  <div id="gameover-overlay">
    <div class="gameover-box">
      <div class="gameover-title">GAME OVER</div>
      <div class="gameover-score"></div>
      <div class="gameover-message"></div>
      <div class="name-entry">
        <div>Enter your name:</div>
        <input type="text" id="name-input" maxlength="15" placeholder="Anonymous" autocomplete="off">
        <br>
        <button id="name-submit">Submit</button>
      </div>
    </div>
  </div>
  <div id="leaderboard-panel">
    <div class="leaderboard-box">
      <div class="leaderboard-title">LEADERBOARD</div>
      <div id="leaderboard-content"></div>
      <button class="close-btn" id="leaderboard-close">Close</button>
    </div>
  </div>
  <script type="module" src="js/main.js"></script>
</body>
</html>
